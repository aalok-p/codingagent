services:
  - type: web
    name: grocery-inventory-backend
    env: docker
    repo: https://github.com/aalok-p/codingagent
    branch: main
    dockerfilePath: ./backend/Dockerfile
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: SECRET_KEY
        generateValue: true
      - key: ALGORITHM
        value: HS256
      - key: ACCESS_TOKEN_EXPIRE_MINUTES
        value: "1440"
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: CORS_ORIGINS
        sync: false
      - key: RUN_SEED
        value: "true"
    healthCheckPath: /health
