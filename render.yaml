services:
  - type: web
    name: grocery-inventory-backend
    env: docker
    repo: https://github.com/aalok-p/codingagent
    branch: main
    dockerfilePath: ./backend/Dockerfile
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: grocery-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: ALGORITHM
        value: HS256
      - key: ACCESS_TOKEN_EXPIRE_MINUTES
        value: "1440"
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: CORS_ORIGINS
        value: https://grocery-inventory-order-management.vercel.app
      - key: RUN_SEED
        value: "true"
    healthCheckPath: /health

databases:
  - name: grocery-db
    plan: free
    region: oregon
    ipAllowList:
      - source: 0.0.0.0/0
        description: everywhere
